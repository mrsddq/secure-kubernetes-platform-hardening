apiVersion: apps/v1
kind: Deployment
metadata:
  name: secure-api
  namespace: secure-app
  labels:
    app.kubernetes.io/name: secure-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: secure-api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: secure-api
    spec:
      serviceAccountName: secure-app
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: api
          image: cgr.dev/chainguard/nginx:1.27
          ports:
            - containerPort: 8080
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          readinessProbe:
            httpGet:
              path: /
              port: 8080
          livenessProbe:
            httpGet:
              path: /
              port: 8080
