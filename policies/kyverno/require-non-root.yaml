apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: require-non-root
spec:
  validationFailureAction: Enforce
  background: true
  rules:
    - name: require-pod-run-as-non-root
      match:
        any:
          - resources:
              kinds: ["Pod"]
      validate:
        message: Pods must run as non-root.
        pattern:
          spec:
            securityContext:
              runAsNonRoot: true
